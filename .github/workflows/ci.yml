name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  romod-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build mod API + CLI (no game install required)
        run: |
          dotnet build "src/Romestead.ModLoader.Abstractions/Romestead.ModLoader.Abstractions.csproj" -c Release
          dotnet build "src/Romestead.ModLoader.RomodTool/Romestead.ModLoader.RomodTool.csproj" -c Release

      - name: Test RomodFormat (no game install required)
        run: dotnet test "tests/Romestead.RomodFormat.Tests/Romestead.RomodFormat.Tests.csproj" -c Release --verbosity normal
